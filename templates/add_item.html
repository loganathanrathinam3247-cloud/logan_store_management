{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem;">Add New Item</h2>
    <form method="POST">
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" name="name" required placeholder="Milk">
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" name="price" required min="1" placeholder="25">
        </div>
        <div class="form-group">
            <label>Initial Quantity</label>
            <input type="number" name="quantity" required min="0" placeholder="100">
        </div>
        <button type="submit" style="width: 100%;">Save Item</button>
    </form>
</div>
{% endblock %}
