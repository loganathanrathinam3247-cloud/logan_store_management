{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2 style="margin-bottom: 2rem;">Edit Item #{{ pid }}</h2>
    <form method="POST">
        <div class="form-group">
            <label>Item Name</label>
            <input type="text" name="name" required value="{{ item.name }}">
        </div>
        <div class="form-group">
            <label>Price (₹)</label>
            <input type="number" name="price" required min="1" value="{{ item.price }}">
        </div>
        <div class="form-group">
            <label>Stock Quantity</label>
            <input type="number" name="quantity" required min="0" value="{{ item.quantity }}">
        </div>
        <button type="submit" style="width: 100%;">Update Item</button>
    </form>
</div>
{% endblock %}
